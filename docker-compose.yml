services:
  gluetun:
    image: qmcgaw/gluetun:v3.41
    container_name: gluetun
    cap_add:
      - NET_ADMIN
    devices:
      - /dev/net/tun:/dev/net/tun
    ports:
      - 9091:9091 # Interface Transmission
      - 7878:7878 # Interface Radarr
      - 8989:8989 # Interface Sonarr
      - 9696:9696 # Interface Prowlarr
    environment:
      - TZ=${TZ}
      - VPN_SERVICE_PROVIDER=protonvpn
      - VPN_TYPE=${VPN_TYPE}
      - WIREGUARD_PRIVATE_KEY=${WIREGUARD_PRIVATE_KEY}
      - SERVER_COUNTRIES=${SERVER_COUNTRIES}
      - PORT_FORWARD_ONLY=on
      - VPN_PORT_FORWARDING=on
      - WIREGUARD_MTU=1280
      - HEALTH_TARGET_ADDRESSES=1.1.1.1:443,8.8.8.8:443
      - HEALTH_SUCCESS_WAIT_DURATION=5s
      - >-
        VPN_PORT_FORWARDING_UP_COMMAND=/bin/sh -c 'SESSION=""; 
        while [ -z "$$SESSION" ]; do 
        SESSION=$$(wget -qS http://127.0.0.1:9091/transmission/rpc 2>&1 | grep -i "X-Transmission-Session-Id:" | head -n 1 | cut -d: -f2 | tr -d " \r"); 
        sleep 2; 
        done; 
        wget -qO- --header="X-Transmission-Session-Id: $$SESSION" --post-data="{\"method\":\"session-set\",\"arguments\":{\"peer-port\":{{PORTS}}}}" http://127.0.0.1:9091/transmission/rpc'
    volumes:
      - ./config/gluetun:/gluetun
    healthcheck:
      test: ["CMD", "wget", "-qO-", "https://1.1.1.1"]
      interval: 10s
      timeout: 5s
      retries: 3
    restart: unless-stopped

  transmission:
    image: lscr.io/linuxserver/transmission:4.1.1
    container_name: transmission
    network_mode: "service:gluetun"
    environment:
      - PUID=${USER_ID}
      - PGID=${USER_ID}
      - TZ=${TZ}
    volumes:
      - ./config/transmission:/config
      - ${MEDIA_DIR}:/data
    depends_on:
      gluetun:
        condition: service_healthy
    restart: unless-stopped

  radarr:
    image: lscr.io/linuxserver/radarr:6.0.4
    container_name: radarr
    network_mode: "service:gluetun"
    environment:
      - PUID=${USER_ID}
      - PGID=${USER_ID}
      - TZ=${TZ}
    volumes:
      - ./config/radarr:/config
      - ${MEDIA_DIR}:/data
    restart: unless-stopped

  sonarr:
    image: lscr.io/linuxserver/sonarr:4.0.16
    container_name: sonarr
    network_mode: "service:gluetun"
    environment:
      - PUID=${USER_ID}
      - PGID=${USER_ID}
      - TZ=${TZ}
    volumes:
      - ./config/sonarr:/config
      - ${MEDIA_DIR}:/data
    restart: unless-stopped

  prowlarr:
    image: lscr.io/linuxserver/prowlarr:2.3.0
    container_name: prowlarr
    network_mode: "service:gluetun"
    environment:
      - PUID=${USER_ID}
      - PGID=${USER_ID}
      - TZ=${TZ}
    volumes:
      - ./config/prowlarr:/config
    restart: unless-stopped
